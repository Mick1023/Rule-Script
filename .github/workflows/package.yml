name: Package

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      publish:
        description: Publish package to NuGet.org
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Pack NuGet package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RuleScript.sln

      - name: Build
        run: dotnet build RuleScript.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RuleScript.sln --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack RuleScript.Core/RuleScript.Core.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rulescript-core-nuget
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: package
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publish == true) }}

    steps:
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: rulescript-core-nuget
          path: artifacts

      - name: Validate NuGet API key
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is required to publish to NuGet.org."
            exit 1
          fi
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Publish package
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Publish symbols
        run: |
          dotnet nuget push ./artifacts/*.snupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
      - publish
    if: ${{ always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.package.result == 'success' && needs.publish.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: rulescript-core-nuget
          path: artifacts

      - name: Prepare release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/releases/${TAG}.md"

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release-notes.md
          else
            {
              echo "RuleScript ${TAG}"
              echo
              echo "- Build passed"
              echo "- Tests passed"
              echo "- NuGet package generated"
            } > release-notes.md
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RuleScript ${{ github.ref_name }}
          body_path: release-notes.md
          overwrite_files: true
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
