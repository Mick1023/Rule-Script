name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RuleScript.sln

      - name: Build
        run: dotnet build RuleScript.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RuleScript.sln --configuration Release --no-build --verbosity normal
